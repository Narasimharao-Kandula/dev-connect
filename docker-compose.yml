version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devconnect-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devconnect
      POSTGRES_PASSWORD: devconnect123
      POSTGRES_DB: devconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
