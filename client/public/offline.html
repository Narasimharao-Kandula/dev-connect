<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — DevConnect</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100dvh; background:#f8f9fc; color:#1f2937; padding:1rem; text-align:center; }
    .card { background:#fff; border-radius:20px; padding:2.5rem; max-width:400px; box-shadow:0 4px 24px rgba(0,0,0,0.04); border:1px solid rgba(0,0,0,0.06); }
    h1 { font-size:1.5rem; margin-bottom:.5rem; }
    p { color:#6b7280; line-height:1.5; margin-bottom:1.5rem; }
    .btn { display:inline-block; background:linear-gradient(135deg,#6C4CF1,#5538D6); color:#fff; padding:.75rem 2rem; border-radius:12px; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6C4CF1" stroke-width="1.5" style="margin-bottom:1rem"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m-12.728 0a9 9 0 010-12.728m9.9 2.828a5 5 0 010 7.07m-7.07 0a5 5 0 010-7.07"/></svg>
    <h1>You're offline</h1>
    <p>Connect to the internet to use DevConnect. Your cached content is still available.</p>
    <a href="/" class="btn">Try Again</a>
  </div>

</html>
